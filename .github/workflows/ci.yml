name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install pytest httpx fastapi uvicorn pydantic
      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: academic-buddy-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
